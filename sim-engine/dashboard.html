<style>
  :root {
    --bg:#060b14; --card:#0f1623; --border:#1a2436; --text:#dde4f0; --muted:#556; --muted2:#334;
    --blue:#38bdf8; --green:#4ade80; --gold:#fbbf24; --red:#f87171; --purple:#a78bfa;
    --orange:#fb923c; --teal:#2dd4bf; --pink:#f472b6; --gray:#94a3b8;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:12px;line-height:1.4}
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .topbar{background:#030812;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
  .topbar h1{font-size:14px;letter-spacing:2px;color:var(--blue)}
  .topbar .meta{display:flex;gap:18px;font-size:11px;color:var(--muted);align-items:center;flex-wrap:wrap}
  .topbar .meta b{color:var(--text)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;padding:10px;max-width:1920px;margin:0 auto}

  .card{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border);position:relative}
  .card .bar{height:3px}
  .card .body{padding:11px 13px 13px}
  .card .title{font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .card .main{font-size:22px;font-weight:800;line-height:1.1;margin-bottom:3px}
  .card .sub{font-size:10px;color:var(--muted);line-height:1.4}
  .card .spark{display:flex;align-items:flex-end;gap:1px;height:20px;margin-top:8px}
  .card .spark div{flex:1;min-width:2px;background:var(--blue);border-radius:1px 1px 0 0;opacity:.5;min-height:1px}
  .card .spark div.hi{opacity:1;background:var(--green)}
  .card .spark div.lo{opacity:1;background:var(--red)}
  .card .tag{display:inline-block;font-size:9px;padding:1px 7px;border-radius:8px;margin-top:5px;font-weight:600}
</style>
</head>

/* ── RENDER ── */
(function(){
  document.getElementById('hd').textContent = '2026-07-13';
  document.getElementById('ht').textContent = '0';

  const sparkSVG = (arr, hi) => {
    if(!arr || !arr.length) return '';
    const max = Math.max(...arr, hi || 1);
    return `<div class="spark">${arr.map((v,i)=>{
      const h = Math.max(2, (v/max)*100);
      const cls = v > arr[arr.length-1] ? 'hi' : v < arr[arr.length-1] ? 'lo' : '';
      return `<div class="${cls}" style="height:${h}%"></div>`;
    }).join('')}</div>`;
  };

  const grid = document.getElementById('grid');
  grid.innerHTML = D75.map((c,i) => `
    <div class="card" id="c${i}">
      <div class="bar" style="background:${c.color}"></div>
      <div class="body">
        <div class="title" style="color:${c.color}">${c.icon} ${c.title}</div>
        <div class="main" style="color:var(--text)">${c.main}</div>
        <div class="sub">${c.sub}</div>
        ${c.spark ? sparkSVG(c.spark, 40) : ''}
      </div>
    </div>
  `).join('');
})();
</script>
